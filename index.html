<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madagascar Animals</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Madagascar Animals 🐒</h1>

        <div class="animal-card">
            <h2>Lemur</h2>
            <img src="lemur.jpg" alt="Lemur">
            <p>Lemurs are found only in Madagascar.</p>
        </div>

        <div class="animal-card">
            <h2>Fossa</h2>
            <img src="fossa.jpg" alt="Fossa">
            <p>The fossa is the top predator of Madagascar.</p>
        </div>

        <div class="animal-card">
            <h2>Chameleon</h2>
            <img src="chameleon.jpg" alt="Chameleon">
            <p>Chameleons can change color and live in trees.</p>
        </div>
        
        <p class="footer">Made by Matthieu 😎</p> 
    </div>
</body>
</html>
